<main class="container py-5">
    <h1 class="mb-4">Managing Committee</h1>
    <section class="row g-4" x-data="dataOfficeBearers">

        <template :key="person.name" x-for="person in people">
            <div class="col-12 col-sm-6 col-lg-4">
                <article class="card h-100 shadow-sm border-0 office-bearer-card">
                    <img :alt="person.name" :src="person.image"
                         class="card-img-top mx-auto mb-3 office-bearer-avatar">

                    <div class="card-body text-center">
                        <h2 class="h5 card-title mb-1" x-text="person.name"></h2>
                        <p class="text-muted mb-0" x-text="person.position"></p>
                    </div>
                </article>
            </div>
        </template>

    </section>

</main>
