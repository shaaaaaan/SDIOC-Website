<main class="container py-5 text-light">

  <!-- Header Block -->
  <div class="mb-5 border-bottom border-secondary pb-3">
    <h1 class="display-4 fw-bold text-info">Downloads & Publications</h1>
    <p class="text-white-50 lead mb-0">Browse through liturgical documents, seasonal prayer books, and sacramental resources.</p>
  </div>

  <!-- Category Loop Layout Grid -->
  @for (category of resourceCategories(); track category.categoryName) {
    <section class="mb-5">

      <!-- Structural Category Section Heading -->
      <h2 class="h4 text-white fw-bold mb-3 border-start border-3 border-info ps-2">{{category.categoryName}}</h2>

      <!-- Standard Dynamic Rows Container -->
      <div class="list-group border border-secondary shadow-sm rounded">
        @for (item of category.items; track item.url) {
          <div class="list-group-item bg-dark border-secondary text-light d-flex justify-content-between align-items-center py-3 px-4">

            <!-- PDF Label Identification -->
            <div class="d-flex align-items-center gap-3">
                            <span class="text-info">
                                <svg xmlns="http://w3.org" width="18" height="18" fill="currentColor" class="bi bi-file-earmark-arrow-down" viewBox="0 0 16 16">
                                    <path d="M8.5 6.5a.5.5 0 0 0-1 0v3.793L6.146 9.146a.5.5 0 1 0-.708.708l2 2a.5.5 0 0 0 .708 0l2-2a.5.5 0 0 0-.708-.708L8.5 10.293z"/>
                                    <path d="M14 14V4.5L9.5 0H4a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h8a2 2 0 0 0 2-2M9.5 3A1.5 1.5 0 0 0 11 4.5h2V14a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V2a1 1 0 0 1 1-1h5.5z"/>
                                </svg>
                            </span>
              <span class="text-light-50 fw-medium small-md">{{item.name}}</span>
            </div>

            <!-- Open Action Anchor Button -->
            <a [href]="item.url"
               target="_blank"
               rel="noopener noreferrer"
               class="btn btn-sm btn-outline-info rounded-pill px-3 fs-7">
              Download PDF
            </a>

          </div>
        }
      </div>

    </section>
  }

</main>
