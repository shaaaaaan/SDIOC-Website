<style>
  /* Navbar */
  .main-navbar {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    background-color: var(--church-bg-primary) !important;
    color: var(--church-navbar-primary);
    text-shadow: 1px 1px 2px black, 2px 2px 4px black, 3px 3px 6px black;

    .navbar-brand img {
      width: 72px;
      height: 72px;
      object-fit: contain;
    }

    .brand-title {
      font-size: clamp(1.45rem, 2vw, 2.25rem);
      font-weight: 700;
      letter-spacing: 0.05em;
      color: var(--church-navbar-primary);
      line-height: 1;
      text-transform: uppercase;
      text-shadow: none;
    }

    .brand-subtitle {
      font-size: 0.92rem;
      letter-spacing: 0.12em;
      color: var(--church-navbar-primary);
      text-transform: uppercase;
      margin-top: 0.25rem;
      text-shadow: none;
    }

    .navbar-grid {
      display: grid;
      grid-template-columns: 1fr auto;
      width: 100%;
      justify-items: start;
      align-items: center;
      grid-template-rows: auto 1fr;
      padding: 0 1rem;

      .navbar-brand {
        grid-row: 1;
        cursor: pointer;
      }

      .navbar-toggler {
        grid-row: 1;
      }

      #mainNavigation {
        /*grid-row: 2;*/
        justify-self: left;
      }
    }

    .dropdown-menu {
      background: var(--church-navbar-drop-menu-background);
      /*text-shadow: none;*/
    }

    .nav-link {
      color: var(--church-navbar-primary);
      font-weight: 600;
      font-size: 0.65rem;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      padding-left: 0.9rem !important;
      padding-right: 0.9rem !important;
    }

    .nav-link.active,
    .nav-link.show {
      color: var(--church-navbar-primary);
    }

    .btn-donate {
      background: var(--church-gold);
      border-color: var(--church-gold);
      color: #fff;
      font-weight: 700;
      /* letter-spacing: 0.08em; */
      text-transform: uppercase;
      text-shadow: none;
    }

    .btn-donate:hover,
    .btn-donate:focus {
      background: var(--church-gold-dark);
      border-color: var(--church-gold-dark);
      color: #fff;
    }

    .navbar-toggler {
      box-shadow: none;
    }

  }
</style>
